<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <meta charset="UTF-8" />
        <title>Login - Richman Empire</title>
    </head>
    <body>
        <div id="login-box">
            <h1>Welcome to Richman Empire</h1>
            <p>Please log in or create an account.</p>

            <input type="text" id="username" placeholder="Username" />
            <input type="password" id="password" placeholder="Password" />

            <button class="login-btn" onclick="loginAccount()">Login</button>
            <button
                class="login-btn"
                onclick="createAccount()"
                style="background-color: #a482c4; color: white"
            >
                Create Account
            </button>

            <p
                id="error-msg"
                style="color: red; display: none; font-weight: bold"
            ></p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
